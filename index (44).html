<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Hit Test — Домашнее задание 17</title>
    <style>

    </style>
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>
<body>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        let container;
        let camera, scene, renderer;
        let xrRefSpace = null;
        let hitTestSource = null;

        let reticle; // Наш прицел
        let loadedModel = null; // Шаблон загруженной 3D-модели

        init();
        animate();

        function init() {
            container = document.createElement('div');
            document.body.appendChild(container);

            // 1. Сцена и камера
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            // 2. Свет (важно для 3D-моделей, чтобы они не были черными)
            const ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 1.5);
            directionalLight.position.set(10, 15, 10);
            scene.add(directionalLight);

            // 3. Рендерер
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            container.appendChild(renderer.domElement);

            // 4. Кнопка запуска AR
            document.body.appendChild(ARButton.createButton(renderer, { requiredFeatures: ['hit-test'] }));

            // 5. Создаем ПРИЦЕЛ вместо обычного кольца
            const textureLoader = new THREE.TextureLoader();
            const crosshairTexture = textureLoader.load('crosshair.png'); // Твоя текстура

            // Плоскость, которая будет лежать на полу
            const reticleGeometry = new THREE.PlaneGeometry(0.2, 0.2); 
            reticleGeometry.rotateX(-Math.PI / 2); // Поворачиваем горизонтально полу

            const reticleMaterial = new THREE.MeshBasicMaterial({
                map: crosshairTexture,
                transparent: true,
                opacity: 0.8, // Полупрозрачный, как просили в задании
                depthWrite: false
            });

            reticle = new THREE.Mesh(reticleGeometry, reticleMaterial);
            reticle.matrixAutoUpdate = false;
            reticle.visible = false; // Появится только когда найдет поверхность
            scene.add(reticle);

            // 6. Загружаем 3D-МОДЕЛЬ вместо куба
            const gltfLoader = new GLTFLoader();
            gltfLoader.load('model.glb', function (gltf) {
                loadedModel = gltf.scene;
                
                // На всякий случай уменьшаем масштаб (многие модели из интернета огромные)
                // 0.1 — это примерно 10 сантиметров. Подкрути под свою модель.
                loadedModel.scale.set(0.1, 0.1, 0.1); 
            }, undefined, function (error) {
                console.error('Ошибка загрузки модели:', error);
            });

            // 7. Обработчик клика по экрану (Спавн объекта)
            function onSelect() {
                if (reticle.visible && loadedModel) {
                    // Клонируем загруженную модель, чтобы можно было ставить много объектов
                    const modelClone = loadedModel.clone();
                    
                    // Переносим координаты прицела на клонированную модель
                    modelClone.position.setFromMatrixPosition(reticle.matrix);
                    
                    scene.add(modelClone);
                }
            }

            // Подключаем триггер тапа к контроллеру WebXR
            const controller = renderer.xr.getController(0);
            controller.addEventListener('select', onSelect);
            scene.add(controller);

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // 8. Цикл анимации и логика Hit Test
        function animate() {
            renderer.setAnimationLoop(render);
        }

        function render(timestamp, frame) {
            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                // Инициализируем поиск поверхностей при старте сессии
                if (hitTestSource === null) {
                    session.requestReferenceSpace('viewer').then(function (viewerSpace) {
                        session.requestHitTestSource({ space: viewerSpace }).then(function (source) {
                            hitTestSource = source;
                        });
                    });

                    session.addEventListener('end', function () {
                        hitTestSource = null;
                        xrRefSpace = null;
                    });
                }

                // Если поверхности сканируются
                if (hitTestSource) {
                    const hitTestResults = frame.getHitTestResults(hitTestSource);

                    if (hitTestResults.length > 0) {
                        const hit = hitTestResults[0];
                        const pose = hit.getPose(referenceSpace);

                        // Показываем прицел и обновляем его позицию на полу
                        reticle.visible = true;
                        reticle.matrix.fromArray(pose.transform.matrix);
                    } else {
                        // Скрываем, если потеряли поверхность из виду
                        reticle.visible = false;
                    }
                }
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
